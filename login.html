<!DOCTYPE html>
<html lang="en">
<head>

<title>Login - Technogigwork</title>

</head>

<body>

<section class="hero">
    <h2>Login</h2>
    <p>Welcome Back!</p>

    <form style="max-width:400px;margin:auto;">

        <button class="btn" style="width:100%;">Login</button>
    </form>

</section>
