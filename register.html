<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Technogigwork</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="hero">
    <h2>Create Account</h2>
    <p>Join Technogigwork Today!</p>

    <form style="max-width:400px;margin:auto;">
        <input type="text" placeholder="Full Name" required style="width:100%;padding:15px;margin:10px 0;border-radius:8px;">

        <input type="email" placeholder="Email" required style="width:100%;padding:15px;margin:10px 0;border-radius:8px;">

        <input type="password" placeholder="Password" required style="width:100%;padding:15px;margin:10px 0;border-radius:8px;">

        <button class="btn" style="width:100%;">Register</button>
    </form>

</section>

</body>
</html>
