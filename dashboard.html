<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechnoGigWork Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f7fb;
}

header{
width:100%;
height:240px;
background:linear-gradient(135deg,#071b36,#103a69);
position:relative;
overflow:hidden;
border-radius:0 0 30px 30px;
}

header img{
width:100%;
height:100%;
object-fit:cover;
opacity:.28;
position:absolute;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.35);
}

.topbar{
position:absolute;
top:20px;
left:20px;
right:20px;
display:flex;
justify-content:space-between;
align-items:center;
color:#fff;
}

.profile{
display:flex;
align-items:center;
gap:12px;
}

.profile img{
width:55px;
height:55px;
border-radius:50%;
border:3px solid gold;
object-fit:cover;
}

.name{
font-size:20px;
font-weight:700;
}

.uid{
font-size:12px;
opacity:.8;
}

.notify{
font-size:28px;
}

.balanceCard{
position:absolute;
left:50%;
transform:translateX(-50%);
bottom:-70px;
width:92%;
background:#fff;
border-radius:20px;
padding:22px;
box-shadow:0 15px 40px rgba(0,0,0,.12);
}

.balanceTitle{
font-size:15px;
color:#777;
}

.balance{
font-size:38px;
font-weight:800;
color:#0d8d46;
margin-top:5px;
}

.row{
display:flex;
justify-content:space-between;
margin-top:20px;
}

.item{
text-align:center;
flex:1;
}

.item h3{
font-size:22px;
color:#111;
}

.item p{
font-size:13px;
color:#777;
}

main{
padding:95px 18px 20px;
}

.sectionTitle{
font-size:22px;
font-weight:700;
margin-bottom:15px;
color:#222;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:#fff;
border-radius:18px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
text-align:center;
transition:.3s;
}

.card:active{
transform:scale(.97);
}

.icon{
font-size:40px;
margin-bottom:10px;
}

.card h2{
font-size:17px;
color:#222;
}

.card p{
font-size:12px;
color:#666;
margin-top:6px;
}<!-- ===== WORK SECTIONS ===== -->
<section class="work-grid">

  <div class="card">
    <h3>📧 Gmail Sell</h3>
    <p>Sell verified Gmail accounts.</p>
    <button>Start Work</button>
  </div>

  <div class="card">
    <h3>📝 Micro Tasks</h3>
    <p>Complete small tasks and earn.</p>
    <button>Open</button>
  </div>

  <div class="card">
    <h3>💼 Job Posts</h3>
    <p>Available online jobs.</p>
    <button>View Jobs</button>
  </div>

  <div class="card">
    <h3>🎁 Weekly Lottery</h3>
    <p>1 ticket every 7 days.</p>
    <button id="lotteryBtn">Claim Ticket</button>
  </div>

  <div class="card">
    <h3>👥 Referral</h3>
    <h2 id="refCount">0</h2>
    <button>Invite Friends</button>
  </div>

  <div class="card">
    <h3>💳 Withdraw</h3>
    <button>Withdraw Now</button>
  </div>

</section>

<script type="module" src="dashboard.js"></script>

</body>
</html>
